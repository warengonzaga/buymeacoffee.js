name: Package Build

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      dry-run:
        description: Perform dry run without publishing
        type: boolean
        default: true
  release:
    types:
      - published

permissions:
  contents: read
  packages: write
  pull-requests: write

concurrency:
  group: package-publish
  cancel-in-progress: false

jobs:
  build:
    name: Build and Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Test
        run: bun test

      - name: Publish
        uses: wgtechlabs/package-build-flow-action@v2.1.1
        with:
          package-manager: bun
          registry: both
          access: public
          npm-token: ${{ secrets.NPM_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          dry-run: ${{ github.event_name != 'release' && (github.event_name != 'workflow_dispatch' || inputs.dry-run) }}
