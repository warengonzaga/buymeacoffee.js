name: Deploy Webpage

on:
  push:
    branches:
      - main
      - webpage
    paths:
      - .github/workflows/pages.yml
      - CNAME
      - index.html
      - assets/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout webpage source
        uses: actions/checkout@v6.0.2
        with:
          ref: webpage
          path: webpage-source

      - name: Prepare site artifact
        run: |
          mkdir public
          if [ -f webpage-source/CNAME ]; then cp webpage-source/CNAME public/; fi
          if [ -f webpage-source/index.html ]; then cp webpage-source/index.html public/; fi
          if [ -d webpage-source/assets ]; then cp -R webpage-source/assets public/; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
